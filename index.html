<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Balaji Enterprises | Premium Fire Safety Solutions</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-loader" style="position: fixed; inset: 0; background: #1d3557; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease-out;">
      <div style="width: 80px; height: 80px; border: 4px solid #e63946; border-radius: 20px; display: flex; items-center; justify-content: center; margin-bottom: 2rem;">
        <span style="color: #e63946; font-size: 2rem; font-weight: 900;">B</span>
      </div>
      <h1 style="color: white; font-family: sans-serif; font-size: 1.5rem; margin-bottom: 0.5rem; letter-spacing: -0.025em;">Balaji Enterprises</h1>
      <p style="color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;">Initializing Safety Core...</p>
    </div>
    <script>
      window.onload = () => {
        const loader = document.getElementById('boot-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
      };
    </script>
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
      <filter id="haze">
        <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" seed="1">
          <animate attributeName="baseFrequency" dur="10s" values="0.01;0.015;0.01" repeatCount="indefinite" />
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" scale="5" />
      </filter>
    </svg>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
